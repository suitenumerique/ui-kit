name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

permissions:
  contents: read
  actions: read

jobs:

  check-changelog:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'noChangeLog') == false &&
      github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 50
      - name: Check that the CHANGELOG has been modified in the current branch
        run: git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.after }} | grep 'CHANGELOG.md'

  install-front:
    uses: ./.github/workflows/front-dependencies-installation.yml
    with:
      node_version: "20.x"

  lint-git:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' # Makes sense only for pull requests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: show
        run: git log
      - name: Enforce absence of print statements in code
        run: |
          ! git diff origin/${{ github.event.pull_request.base.ref }}..HEAD -- . ':(exclude)**/main.yml' ':(exclude)**/pdf.worker.mjs' ':(exclude)**/printImage.ts' ':(exclude)**/image-preview.spec.ts' | grep "print("
      - name: Check absence of fixup commits
        run: |
          ! git log | grep 'fixup!'
      - name: Install gitlint
        run: pip install --user requests gitlint
      - name: Lint commit messages added to main
        run: ~/.local/bin/gitlint --commits origin/${{ github.event.pull_request.base.ref }}..HEAD

  lint:
    runs-on: ubuntu-latest
    needs: install-front
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
      - name: Restore the frontend cache
        uses: actions/cache@v5
        with:
          path: "node_modules"
          key: front-node_modules-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      - name: Check linting
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    needs: install-front
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
      - name: Restore the frontend cache
        uses: actions/cache@v5
        with:
          path: "node_modules"
          key: front-node_modules-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      - name: Run tests
        run: yarn test

  build:
    runs-on: ubuntu-latest
    needs: install-front
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
      - name: Restore the frontend cache
        uses: actions/cache@v5
        with:
          path: "node_modules"
          key: front-node_modules-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      - name: Build
        run: yarn build

  e2e:
    runs-on: ubuntu-latest
    needs: install-front
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
      - name: Restore the frontend cache
        uses: actions/cache@v5
        with:
          path: "node_modules"
          key: front-node_modules-${{ hashFiles('yarn.lock') }}
          fail-on-cache-miss: true
      # Playwright browsers live outside node_modules and weigh hundreds of
      # MB; cache them by the @playwright/test version so we only re-download
      # when the version bumps.
      - name: Restore Playwright browsers cache
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps chromium webkit firefox
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium webkit firefox
      # The PDF viewer loads pdfjs's worker from /pdf.worker.mjs at runtime;
      # copy it from the installed pdfjs-dist so the served public/ has it.
      - name: Provision PDF worker
        run: cp node_modules/pdfjs-dist/build/pdf.worker.mjs public/pdf.worker.mjs
      - name: Generate test PDFs
        run: yarn generate-test-pdfs
      - name: Run component tests
        run: yarn test:ct
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/report
            test-results
          retention-days: 7
